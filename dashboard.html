/* ═══════════ CSV EXPORT ═══════════ */
function exportOrderCSV() {
  if (cart.length === 0) {
    alert('Your cart is empty.');
    return;
  }

  var company = document.getElementById('coName').value.trim() || 'Order';
  var contact = document.getElementById('coContact').value.trim();
  var email = document.getElementById('coEmail').value.trim();
  var phone = document.getElementById('coPhone').value.trim();
  var notes = document.getElementById('coNotes').value.trim();

  var headers = ['Source', 'Warehouse', 'Producer', 'Wine', 'Qty (cases)', 'Unit Price', 'Line Total'];
  var csvRows = [];

  if (company) csvRows.push('Company,' + csvEscape(company));
  if (contact) csvRows.push('Contact,' + csvEscape(contact));
  if (email) csvRows.push('Email,' + csvEscape(email));
  if (phone) csvRows.push('Phone,' + csvEscape(phone));
  if (notes) csvRows.push('Notes,' + csvEscape(notes));
  csvRows.push('');
  csvRows.push(headers.join(','));

  var grandTotal = 0;

  var allocationItems = cart.filter(function(c) { return c.source !== 'catalog'; });
  var catalogItems = cart.filter(function(c) { return c.source === 'catalog'; });

  allocationItems.forEach(function(item) {
    var lineTotal = item.price * item.qty;
    grandTotal += lineTotal;
    csvRows.push([
      'Allocation',
      '',
      csvEscape(item.producer),
      csvEscape(item.wine),
      item.qty,
      item.price > 0 ? item.price.toFixed(2) : '',
      item.price > 0 ? lineTotal.toFixed(2) : 'TBD'
    ].join(','));
  });

  catalogItems.forEach(function(item) {
    var lineTotal = item.price * item.qty;
    grandTotal += lineTotal;
    csvRows.push([
      'Catalog Request',
      csvEscape(item.warehouse_label || item.warehouse || ''),
      csvEscape(item.producer),
      csvEscape(item.wine),
      item.qty,
      item.price > 0 ? item.price.toFixed(2) : '',
      item.price > 0 ? lineTotal.toFixed(2) : 'TBD'
    ].join(','));
  });

  csvRows.push('');
  csvRows.push(',,,,,Total,' + (grandTotal > 0 ? grandTotal.toFixed(2) : 'TBD'));

  var csvContent = csvRows.join('\n');
  var blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  var safeName = company.replace(/[^a-zA-Z0-9]/g, '_') || 'Order';
  a.download = 'The_Source_Order_' + safeName + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function csvEscape(str) {
  if (!str) return '';
  str = String(str);
  if (str.indexOf(',') !== -1 || str.indexOf('"') !== -1 || str.indexOf('\n') !== -1) {
    return '"' + str.replace(/"/g, '""') + '"';
  }
  return str;
}

function getStockBadge(wine) {
  var available = wine.available || 0;
  var onHand = wine.on_hand || 0;

  if (available > 0 && onHand > 0) {
    if (available <= 5) return '<span class="stock-badge low-stock">Low Stock (' + available + ' cs)</span>';
    return '<span class="stock-badge in-stock">In Stock (' + available + ' cs)</span>';
  }
  if (available > 0 && onHand <= 0) {
    return '<span class="stock-badge pre-arrival">Pre-Arrival</span>';
  }
  return '';
}

/* ═══════════ UTILITIES ═══════════ */
function escapeHtml(text) {
  if (!text) return '';
  var div = document.createElement('div');
  div.textContent = String(text);
  return div.innerHTML;
}

function stripProducerPrefix(wineName) {
  var idx = wineName.indexOf(',');
  if (idx === -1) return wineName;
  return wineName.substring(idx + 1).trim();
}

function slugify(str) {
  return (str || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

function formatVarietals(varietals) {
  if (!varietals || !varietals.length) return '';
  return varietals.map(function(v) { return v.name || v; }).join(', ');
}

function formatFarming(farming) {
  if (!farming || farming === '[]') return '';
  if (Array.isArray(farming)) return farming.join(', ');
  try { var arr = JSON.parse(farming); if (Array.isArray(arr)) return arr.join(', '); } catch(e) {}
  return String(farming);
}

function toggleWineDetails(btn) {
  var details = btn.nextElementSibling;
  btn.classList.toggle('open');
  details.classList.toggle('open');
}

function buildCarousel(images, producerName) {
  if (!images || images.length === 0) return '';
  var slides = '';
  images.forEach(function(img, i) {
    slides += '<div class="carousel-slide"><img src="' + escapeHtml(img) + '" alt="' + escapeHtml(producerName) + '"' + (i > 0 ? ' loading="lazy"' : '') + '></div>';
  });
  return '<div class="carousel" data-autoplay="5000">' +
    '<div class="carousel-track">' + slides + '</div>' +
    '<button class="carousel-btn prev">&#8249;</button>' +
    '<button class="carousel-btn next">&#8250;</button>' +
    '<div class="carousel-dots"></div></div>';
}

function initCarousels() { initCarouselsIn(document); }
function initCarouselsIn(root) {
  root.querySelectorAll('.carousel').forEach(function(carousel) {
    if (carousel.dataset.init) return; // already initialized
    carousel.dataset.init = '1';

    var track = carousel.querySelector('.carousel-track');
    var slides = carousel.querySelectorAll('.carousel-slide');
    var prevBtn = carousel.querySelector('.carousel-btn.prev');
    var nextBtn = carousel.querySelector('.carousel-btn.next');
    var dotsContainer = carousel.querySelector('.carousel-dots');
    var totalSlides = slides.length;
    var currentIndex = 0;
    var autoplayInterval = null;
    var autoplayDelay = parseInt(carousel.dataset.autoplay) || 4000;

    if (totalSlides <= 1) {
      if (prevBtn) prevBtn.style.display = 'none';
      if (nextBtn) nextBtn.style.display = 'none';
      if (dotsContainer) dotsContainer.style.display = 'none';
      return;
    }

    for (var i = 0; i < totalSlides; i++) {
      var dot = document.createElement('button');
      dot.classList.add('carousel-dot');
      if (i === 0) dot.classList.add('active');
      (function(idx) { dot.addEventListener('click', function() { goTo(idx); }); })(i);
      dotsContainer.appendChild(dot);
    }
    var dots = dotsContainer.querySelectorAll('.carousel-dot');

    function goTo(index) {
      currentIndex = ((index % totalSlides) + totalSlides) % totalSlides;
      track.style.transform = 'translateX(-' + (currentIndex * 100) + '%)';
      dots.forEach(function(d, i) { d.classList.toggle('active', i === currentIndex); });
    }
    function next() { goTo(currentIndex + 1); }
    function prev() { goTo(currentIndex - 1); }

    prevBtn.addEventListener('click', function() { prev(); resetAutoplay(); });
    nextBtn.addEventListener('click', function() { next(); resetAutoplay(); });

    function startAutoplay() { autoplayInterval = setInterval(next, autoplayDelay); }
    function resetAutoplay() { clearInterval(autoplayInterval); startAutoplay(); }

    carousel.addEventListener('mouseenter', function() { clearInterval(autoplayInterval); });
    carousel.addEventListener('mouseleave', function() { startAutoplay(); });

    var touchStartX = 0;
    carousel.addEventListener('touchstart', function(e) { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
    carousel.addEventListener('touchend', function(e) {
      var diff = touchStartX - e.changedTouches[0].screenX;
      if (Math.abs(diff) > 50) { if (diff > 0) next(); else prev(); resetAutoplay(); }
    });
    startAutoplay();
  });
}

// Shared observer for scroll reveal — reused across progressive renders
var _scrollRevealObserver = null;
function initScrollReveal() { initScrollRevealIn(document); }
function initScrollRevealIn(root) {
  if (!_scrollRevealObserver) {
    _scrollRevealObserver = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
  }
  root.querySelectorAll('.producer-section').forEach(function(s) {
    if (!s.dataset.observed) {
      s.dataset.observed = '1';
      _scrollRevealObserver.observe(s);
    }
  });
}
